spring:
  profiles:
    include: secret
  application:
    name: minilog-graphql
  datasource:
    url: jdbc:mysql://localhost:3307/minilog_db
    username: minilog_user
    password: dev_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  graphql:
    schema:
      introspection:
        enabled: true
    graphiql:
      enabled: true
      path: /graphiql